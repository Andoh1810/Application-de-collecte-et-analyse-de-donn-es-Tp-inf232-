<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdn.plot.ly/plotly-latest.min.js"></script>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
        crossorigin="anonymous"></script>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/index.css') }}">
    <title>Kolekt | {% block title %}{% endblock %} </title>
</head>

<body>

    <header>
        <h1><a href="{{ url_for('main.accueil') }}"><span class="logo" style="color: rgb(5, 141, 151) ;">K</span>Kolekt</a></h1>
        <nav>
            <ul class="ull">
                <li><a href="{{ url_for('main.accueil') }}" class="liens">Accueil</a></li>
                <li><a href="{{ url_for('main.formulaire') }}" class="liens">Formulaire</a></li>
                <li><a href="{{ url_for('main.analyse') }}" class="liens">Dashboard</a></li>
            </ul>
        </nav>
    </header>

    {% block contenu %}{% endblock %}
    <footer style="background-color: #1a1a2e; text-align: center; bottom: 0; box-shadow: 0 -2px 25px #313157; padding: 20px;">
        <h1 style="font-size: 3rem;"> <span>K</span>OLEKT <span>APP</span></h1><br>
        <p style="font-size: 1.6rem;">&copy; 2026 tous droits réservés</p>
        <p style="font-size: 1.6rem;">développé dans le cadre du Tp inf232</p>
    </footer>

    <ul class="nav nav-pills nav-fill gap-2 p-1 small bg-primary shadow-sm navbar-tel" id="pillNav2"
        style="--bs-nav-link-color: var(--bs-white); --bs-nav-pills-link-active-color: #1a1a2e; --bs-nav-pills-link-active-bg: var(--bs-white);">
        <li class="nav-item">
            <a href="{{ url_for('main.accueil') }}" class="nav-link rounded-5 foot-btn">Accueil</a>
        </li>
        <li class="nav-item">
            <a href="{{ url_for('main.formulaire') }}" class="nav-link rounded-5 foot-btn">Formulaire</a>
        </li>
        <li class="nav-item">
            <a href="{{ url_for('main.analyse') }}" class="nav-link rounded-5 foot-btn">Dashboard</a>
        </li>
    </ul>
    <script>
        const url = window.location.pathname;
        document.querySelectorAll('.navbar-tel .nav-link').forEach(link => {
            link.classList.remove('active');
            if (link.getAttribute('href') === url) {
                link.classList.add('active');
            }
        });
        const url2 = window.location.pathname;
        document.querySelectorAll('.liens').forEach(link => {
            link.classList.remove('activee');
            if (link.getAttribute('href') === url2) {
                link.classList.add('activee');
            }
        });
    </script>

</body>

</html>
